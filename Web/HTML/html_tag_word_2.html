<!DOCTYPE html>
<html lang='ko'>
<head>
    <meta charset="utf-8">
    <title>글자 꾸미기</title>
</head>
<body>
    <mark>중요한</mark> 내용을 <em>강조</em> 할 때 사용
    <i>이탤릭</i>체로 표현 italic<br>
    <b>굵은 글자</b>로 표현 bold체 <br>
    <strong>굵은 글자</strong>로 표현 강조의 의미 <br>
    <small>작은 글자</small>로 표현<br>
    <sub>아래 첨자</sub>로 표현<br>
    <sup>위 첨자</sup>로 표현<br>
    <ins>밑줄 글자</ins>로 표현<br>
    <del>가운데 줄이 그어진 글자</del>로 표현<br>
    H<sub>2</sub>O <br>
    필요한 내용에 <ins>밑줄</ins>을 표시 <br>
    필요한 내용에 <del>취소선</del>을 표시 <br>

    <ul>
        <li>모행</li>
        <li>잠와</li>
    </ul>
    <ul>
        <li>사과</li>
        <li>바나나</li>
        <li>포도</li>
    </ul>
    <hr>
    <!--type: 1|a|A|i|I|disc|circle|square-->
    <!--ul>li{$}*3-->
    <ul type = 'a'>
        <li>2</li>
        <li>2</li>
        <li>2</li>
    </ul>
    <ol type='I' reversed>
        <li>지하철타기</li>
        <li>버스타기 183번</li>
        <li>라면</li>
        <li>랜덤</li>
        <li type="none">
            <ol type='1' start="5">
                <li>돈까쓰</li>
            </ol>
        </li>
    </ol>
</body>
</html>
