<!DOCTYPE html>
<html lang='ko'>
<head>
    <meta charset="utf-8">
    <title></title>
    <style>
    </style>
    <script>
        function showAlert(){
            //window.setTimeout(지연후 실행될 함수,지연시간);
            window.setTimeout(function(){
                alert('setTimeout을 사용하여 표시됩니다.');
            },3000);
        }
    </script>
</head>
<body>
    <p>
        버튼을 누르면 3초 후에 경고박스가 화면에 나타난다.
    </p>
    <button onclick="showAlert();">눌러보세여</button>
</body>
</html>
