<!DOCTYPE html>

    <title></title>
    <style>

    <script>
        //while 참이되면 계속반복 거짓이면 끝
        let i=0;
        while(true){
            i++;
            if(i>100){
                break;
            }
            document.write(i+"<br/>")
        }
        while(i>1){
            i--;
            document.write(i+"<br/>");
        }
        
        let isLogin = true; 
        let choidID = 'id001';
        let choidPW = 'pw001';

        while(isLogin){
            let id = prompt("아이디를 입력해주세");
            let pw = prompt("비밀번호를 입력해주세");

            if(id == choidID && pw == choidPW){
                alert("로그인 성공!");
                isLogin = false; 
            } else {
                alert("정보가 일치하지 않습니다.");
            }
        }
    </script>
