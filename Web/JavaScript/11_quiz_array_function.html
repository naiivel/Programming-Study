<!DOCTYPE html>
<html lang='ko'>
<head>
    <meta charset="utf-8">

    <script src="11_quiz_array_function.js" type="text/javascript">

    <script>
        const STUDENT_NUM = 3;
        let max,min,total,avg;

        //영어 점수
        let englishScores = [];
        englishScores = inputScore(englishScores,STUDENT_NUM,"ENGLISH");
        console.log(englishScores);

        max = maxScore(englishScores);
        min = minScore(englishScores);
        total = totalValue(englishScores);
        avg = average(total, STUDENT_NUM);
        document.write(`english max : ${max} <br/>`);
        document.write(`english min : ${min} <br/>`);
        document.write(`english total : ${total} <br/>`);
        document.write(`english avg : ${avg} <br/>`);
        document.write("<hr/>");
        
        //수학 점수
        let mathScores = new Array();
        mathScores = inputScore(mathScores,STUDENT_NUM,"MATH");
        console.log(mathScores);

        max = maxScore(mathScores);
        min = minScore(mathScores);
        total = totalValue(mathScores);
        avg = average(total, STUDENT_NUM);
        document.write(`math max : ${max} <br/>`);
        document.write(`math min : ${min} <br/>`);
        document.write(`math total : ${total} <br/>`);
        document.write(`math avg : ${avg} <br/>`);
        document.write("<hr/>");
    </script>
