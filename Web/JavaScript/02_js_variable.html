<head>

    <title>variable</title>
    <style></style>
    <script>
       // temp = '천재';
       // console.log(temp);
       // var temp = '정대';
       // console.log(temp);

        // let
        //console.log(temp2);
        //let temp2 = "정대";
        // block scope (바깥에선 사용불가, 지역변수)
        {
            var tempGlobal = "Global fields";
            let tempLocal = "local fields";
        }
        console.log(tempGlobal);
        console.log(tempLocal);
        // var ES6 이전에 사용되던 변수 선언 키워드
        // let ES6 부터 적용된 변수 선언 키워드
        // read / write
        
        // const (constant: 상수)
        const pi = 3.141592;
        pi = 3.14;

    </script>
