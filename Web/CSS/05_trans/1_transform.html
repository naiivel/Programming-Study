<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tramsform</title>
    <style>
        .original{
            width:300px;
            height:300px;
            background:url(../../img/transform_rotate.png);
            border:1px solid black;
        }
        /*
        transform
         좌표공간을 변형함으로써 일반적인 문서 흐름을 방해하지 않고 컨텐츠의 형태와 위치를 변경하는 속성 
         displat:block; 블럭요소에만 적용가능
        */
        .rotate{
            /*rotate: 해당요소를 주어진 각도만큼 시계방향이나 반시계방향으로회전*/
            transform:rotateX(45deg);
            transform:rotateY(45deg);
        }
        .scale:hover{
            /*해당 요소의 크기를 주어진 배율만큼 늘리거나 줄임*/
            transform:scaleX(20);
            transform:scaleY(20);
        }
        .skew:hover{
            /*해당요소를 주어진 각도만큼 각각 x축 y축 방향으로 기울임*/
            transform:skewX(45deg);
            transform:skewY(45deg);
        }
        .translate:hover{
            /*현재위치에서 해당요소를 x축과 y축의 거리만큼 이동*/
            transform:translate(100px,200px);
        }
    </style>
</head>
<body>
    <div class="original"></div>
    <div class="original rotate"></div>
    <div class="original scale"></div>
    <div class="original skew"></div>
    <div class="original translate"></div>
</body>
</html>
