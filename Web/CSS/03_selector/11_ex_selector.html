<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가상선택자</title>
    <style>
        .before::before{
            content: "before는 앞에 붙어요";
            color:red;
        }
        .after::after{
            content:"after는 뒤에 붙어요";
            color:blue;
        }
        .line::first-line{
            color:red;
        }
        /*--필요할때 쓸수있는 가상선택자 (여기서 뽑아서 다른곳에서씀)--*/
        :root{
            --text-content-color:skyblue;
            --text-content-size:30px;
        }
        .line{
            color:var(--text-content-color);
            font-size:var(--text-content-size);
        }
        p{
            color:var(--text-content-color);
        }
    </style>
</head>
<body>
    <p class="before">
        before 예시
    </p>
    <p class="after">
        after 예시
    </p>
    <p class="before after">
        before after 예시
    </p>
    <p class="line">
        <!--lorem-->
        Lorem ipsum dolor sit amet consectetur adipisicing elit. <br/>Eum odit quod illo quasi, quia amet sapiente nesciunt nihil minus neque quae non sequi voluptatibus aliquid officia aspernatur at adipisci corporis!
    </p>
</body>
</html>
