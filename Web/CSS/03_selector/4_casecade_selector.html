<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        h1{
            color:red; 
        }
        *{
            color:greenyellow;
        }
        #bg{
            background-color:skyblue;
        }
        #color{
            color:blue;
        }
        .size{
            font-size:50px;
        }
        .color{
            color:pink;
        }
        h2{
            background-color:aqua;
        }
    </style>
</head>
<body>
    <h1>TYPE 선택자</h1>
    <h2 id="bg">선택자 적용</h2>
    <h2 id="color">선택자 적용</h2>
    <h2 class="size">선택자 적용</h2>
    <h2 style="color:black;" class="color size">선택자 적용</h2>
</body>
</html>
