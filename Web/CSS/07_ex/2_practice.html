<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실습2</title>
    <style>
        .wrap{
            position:relative;
            border:1px solid black;
            width:980px;
            height:300px;
            display:flex;
            justify-content:center;
            align-items:center;
        }
        .word{
            border:1px solid black;
            width:80px;
            height:20px;
            
            position:absolute;
            left:50%;
            top:50%;
            margin-left:-40px;
            margin-top:-10px;
        
            text-align:center;
            animation:rotate 2s linear infinite alternate;
        }
        @keyframes rotate{
            0%{
                transform:rotateY(0deg);
            }
            50%{
                transform:rotateY(180deg);
            }
            100%{
                transform:rotateY(0deg);
            }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="word">KOREATE</div>
    </div>
</body>
</html>
