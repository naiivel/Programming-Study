<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실습1</title>
    <style>
        .redBox{
            background-color:red;
            position:relative;
            width:200px;
            height:200px;
            top:50px;
            left:50px;
            animation:2s redBox;
            animation-iteration-count:infinite;
            /*ease : 기본값 천천히 시작 빨라졌다가 마지막에 느려짐*/
            animation-timing-function:ease;
            animation-direction: narmal;
        }
        @keyframes redBox{
            0%{
                left:0px;
            }
            25%{
                left:100px;
            }
            50%{
                left:200px;
            }
            75%{
                left:100px;
            }
            100%{
                left:0px;
            }
        }
    </style>
</head>
<body>
    <div class="redBox">
    </div>
</body>
</html>
