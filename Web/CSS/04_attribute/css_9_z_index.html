<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z index</title>
    <style>
        div{
            position:absolute;
        }
        .index1{
            width:100%;
            height:300px;
            background-color:pink;
            z-index:10;
        }
        .index2{
            width:300px;
            height:100px;
            background-color:blue;
            z-index:9;
        }
        .index3{
            width:100px;
            height:100px;
            background-color:black;
            z-index:15;
        }
    </style>
</head>
<body>
    <div class="index1"></div>
    <div class="index2">
        <div class="index3"></div>
    </div>
</body>
</html>
