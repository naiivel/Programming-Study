<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>float</title>
    <style>
        *{
            margin:0;
        }
        header{
            width:100%;
            height:100px;
            background-color:pink;
        }
        aside{
            width:15%;
            height:400px;
            background-color:red;
        }
        section{
            float:left;
            width:70%;
            height:400px;
            background-color:blue;
        }
        footer{
            clear:both;
            width:100%;
            height:100px;
            background-color:hotpink;
        }
        .left{
            /*float:left;*/
            float:right;
        }
        .right{
            float:right;
        }
    </style>
</head>
<body>
    <header></header>
    <aside class="left">left</aside>
    <section></section>
    <aside class="right">right</aside>
    <footer></footer>
</body>
</html>
