<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>text</title>
    <style>
        h2{
            width:400px;
            height:100px;
            border:1px solid black;
            overflow:scroll; 
            overflow:hidden;
            overflow:auto;
            text-decoration:underline;
        }
        /*
            white-space 속성 키워드
                    스페이스와탭    줄바꿈  자동 줄바꿈
            normal      병합         병합       0
            nowrap      병합         병합       X
            pre         보존         보존       X
            pre-wrap    보존         보존       O
            pre-line    병합         보존       O
        */
        h2.normal{
            white-space:normal;
        }
        h2.nowrap{
            white-space:nowrap;
            text-overflow:ellipsis; /*범위벗어나면 말줄임표 . . . */
        }
        h2.pre{
            white-space:pre;
        }
        h2.pre-wrap{
            white-space:pre-wrap;
        }
        h2.pre-line{
            white-space:pre-line;
        }
    </style>
</head>
<body>
    <!--h2{BLOCK 요소길게표현하자}*5-->
    <h2 class="normal">
        BLOCK 요소 길게~~~
        표현~~~~
        하자~~~~
    </h2>
    <h2 class="nowrap">
        BLOCK 요소 길게~~~
        표현~~~~
        하자~~~~
    </h2>
    <h2 class="pre">
        BLOCK 요소 길게~~~
        표현~~~~
        하자~~~~
    </h2>
    <h2 class="pre-wrap">BLOCK 요소 길게~~~
        표현~~~~
        하자~~~~
    </h2>
    <h2 class="pre-line">BLOCK 요소 길게~~~
        표현~~~~
        하자~~~~
    </h2>
</body>
</html>
