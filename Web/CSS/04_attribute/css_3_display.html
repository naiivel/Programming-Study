<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>display</title>
    <style>
        h1{
            background-color:skyblue;
            margin-bottom:30px;
            width:200px;
            height:200px;
            display:inline;
            display:inline-block;
        }
        h1.none{
            display:none;
        }
        h1.hidden{
            visibility:hidden;
        }
    </style>
</head>
<body>
    <!--h1{BLOCK 요소 $}*5}-->
    <h1>BLOCK 요소 1</h1>
    <h1>BLOCK 요소 2</h1>
    <h1 class="none">BLOCK 요소 3</h1>
    <h1 class="hidden">BLOCK 요소 4</h1>
    <h1>BLOCK 요소 5</h1>
</body>
</html>
