<!DOCTYPE html>
<html lang='ko'>
<head>
    <meta charset="utf-8">
    <title></title>
    <style>
    </style>
</head>
<body>
      <!-- div#target>(p#p${$번째 달락})*7 -->
      <div id="target">
        <p id="p1" onclick="rmElem(this);">1번째 달락</p>
        <p id="p2" onclick="rmElem(this);">2번째 달락</p>
        <p id="p3" onclick="rmElem(this);">3번째 달락</p>
        <p id="p4" onclick="rmElem(this);">4번째 달락</p>
        <p id="p5" onclick="rmElem(this);">5번째 달락</p>
        <p id="p6" onclick="rmElem(this);">6번째 달락</p>
        <p id="p7" onclick="rmElem(this);">7번째 달락</p>
      </div>
    <button onclick="removeFirst();">첫번째 요소 삭제</button>
    <button onclick="removeLast();">마지막 요소 삭제</button>
<script>
    function removeFirst(){
        let parent = document.getElementById("target");
        let childs = document.querySelectorAll("#target > p");
        console.log(childs.length);
        let first = childs[0];
        parent.removeChild(first);
    }
    function removeLast(){
        let parent = document.getElementById("target");
        let childs = document.querySelectorAll("#target > p");
        console.log(childs.length);
        let last = childs[childs.length-1];
        parent.removeChild(last);
    }

    function rmElem(elem){
        console.log(elem);
        elem.remove();
    } 
</script>
</body>
</html>
